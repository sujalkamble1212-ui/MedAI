<!DOCTYPE html>
<html>
<head>
    <title>Patient Information</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='patient.css') }}">
</head>
<body>

<div class="container">

    <div class="card">
        <h2>Patient Information</h2>
        <p>Please fill patient details before diagnosis</p>

        <form method="POST">

            <div class="form-row">
                <div class="input-group">
                    <label>Patient Name</label>
                    <input type="text" name="patient_name" required>
                </div>

                <div class="input-group">
                    <label>Age</label>
                    <input type="number" name="age" required>
                </div>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <label>Gender</label>
                    <select name="gender" required>
                        <option value="">Select</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Contact</label>
                    <input type="text" name="contact">
                </div>
            </div>

            <button type="submit">Continue to Prediction →</button>

        </form>
    </div>

</div>

</body>
</html>
